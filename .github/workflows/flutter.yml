name: Flutter Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'

      - name: Get dependencies
        run: flutter pub get

      - name: Run analysis
        run: dart analyze

      - name: Run tests
        run: flutter test
