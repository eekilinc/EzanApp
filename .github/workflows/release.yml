name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## 🎉 Ezan Hatırlatıcı ${{ github.ref_name }}

            ### 📦 İndirme
            - **Android APK**: `app-release.apk`

            ### ✨ Yenilikler ve Öne Çıkan Özellikler
            - ⏱️ **Canlı Geri Sayım Sayacı**: Sonraki namaz vaktine kalan canlı saat, dakika ve saniye gösterimi
            - 🔔 **Dinamik Bildirim Sistemi**: 0-60 dakika arasında anında güncellenen tam zamanlı yerel bildirimler
            - 🕌 **Özel Uygulama Logosu & İkonu**: Modern Hilal & Cami temalı yeni logo entegrasyonu
            - 📶 **Çevrimdışı (Offline) Önbellekleme**: İnternet olmadığında da namaz saatlerinin ve bildirimlerin aksamadan çalışması
            - ℹ️ **"Hakkında" Ekranı**: Sürüm bilgisi, kaynaklar ve uygulama açıklamaları
            - 📍 **GPS & Şehir Seçimi**: 12+ Türkiye şehri ve otomatik konum algılama

            ### 🛠️ Teknik Stack
            - Flutter 3.38.5 & Dart 3.10.4
            - Provider State Management
            - Local Notifications & Timezone Entegrasyonu
            - Aladhan API & Offline SharedPreferences Caching
          draft: false
          prerelease: false
