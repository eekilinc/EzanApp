name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 🎉 Ezan Hatırlatıcı ${{ github.ref_name }}

            ### ✨ Features
            - 📍 GPS + Şehir seçimi (12+ Türk şehri)
            - 🕌 5 vakit namaz saatleri
            - 🔔 Özelleştirilebilir hatırlatmalar (0-60 dakika)
            - 🎵 Ezan sesi oynatma
            - ⚙️ Ayarlar paneli (ses, titreşim, hatırlatma süreleri)
            - 🌙 Kullanıcı dostu Türkçe arayüz

            ### 🛠️ Technical Stack
            - Flutter 3.38.5
            - Dart 3.10.4
            - Provider state management
            - Aladhan API

            ### 📖 Links
            - [README](https://github.com/eekilinc/EzanApp/blob/main/README.md)
            - [Release Notes](https://github.com/eekilinc/EzanApp/blob/main/RELEASE_NOTES.md)
          draft: false
          prerelease: false
