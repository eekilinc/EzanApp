name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          release_name: Release ${{ steps.tag.outputs.TAG_NAME }}
          body: |
            ## 🎉 Ezan Hatırlatıcı ${{ steps.tag.outputs.TAG_NAME }}

            ### 📦 Download
            - [Release Notes](../../releases/tag/${{ steps.tag.outputs.TAG_NAME }})

            ### ✨ Features
            - Prayer times with customizable reminders
            - GPS location + city selection
            - Adhan notifications
            - Settings panel

            ### 📖 Documentation
            - [README](../../blob/main/README.md)
            - [GitHub](https://github.com/eekilinc/EzanApp)
          draft: false
          prerelease: false
