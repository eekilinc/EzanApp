name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare Dynamic Release APK Name
        run: |
          TAG_NAME="${{ github.ref_name }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/EzanApp-${TAG_NAME}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/EzanApp-${{ github.ref_name }}.apk
          body: |
            ## 🎉 Ezan Hatırlatıcı ${{ github.ref_name }}

            ### 📦 İndirme
            - **Android APK**: `EzanApp-${{ github.ref_name }}.apk`

            ### ✨ Yenilikler ve Öne Çıkan Özellikler
            - ⏱️ **Canlı Geri Sayım Sayacı**: Sonraki namaz vaktine kalan canlı saat, dakika ve saniye gösterimi
            - 🔔 **Dinamik Bildirim Sistemı**: Vakit öncesinde veya vakit girdikten (sonra) zamanlanabilen bildirimler
            - 🎨 **PRO Renk Temaları**: Zümrüt, Safir, Turkuaz, Bordo ve Kehribar renk seçenekleri
            - 🗓️ **İnteraktif Çift Takvim**: Miladi & Hicri tarih görünümü ve dini günler sayaçları
            - 🕌 **Mekke & Medine Sesli Ezan Kayıtları**: 5 farklı dünya ezanı ve uyarı ses tonu
            - 📶 **Çevrimdışı (Offline) Önbellekleme**: İnternetsiz çalışma ve 30 günlük otomatik zamanlama

            ### 🛠️ Teknik Stack
            - Flutter 3.38.5 & Dart 3.10.4
            - AlarmClock System Level Local Notifications
            - Provider State Management
          draft: false
          prerelease: false
